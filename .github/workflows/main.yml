# ============================================================
#  CI Pipeline — bitfive monorepo
#  Backend : /api  (TypeScript / Node.js)
#  Frontend: /app  (JavaScript / React)
#
#  Jobs
#  ├── lint    → matrix: [api, app]  type-check + eslint en ambos
#  ├── build   → matrix: [api, app]  corre aunque lint falle
#  └── semgrep → SAST dividido: backend (TS+Node) y frontend (JS+React)
#
#  Política Semgrep
#  ├── PR → develop   : baseline scan  (solo findings nuevos, no bloquea)
#  ├── push develop   : full scan      (visible en Security tab)
#  ├── PR → main      : full scan estricto (bloquea si hay ERROR)
#  └── push main / release/* / hotfix/* : full scan estricto (bloquea)
#
#  Fixes aplicados
#  ├── FIX 1: if: needs.lint.result en build   (evita correr si fue cancelado)
#  ├── FIX 2: if: needs.build.result en semgrep (misma razón)
#  ├── FIX 3: imagen semgrep con versión fija   (evita breaking changes en latest)
#  └── FIX 4: permissions solo en job semgrep   (principio de mínimo privilegio)
# ============================================================

name: CI

on:
  push:
    branches:
      - main
      - develop
      - "release/*"
      - "hotfix/*"
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20

jobs:
  # ----------------------------------------------------------
  # 1. LINT — matrix [backend, frontend]
  # ----------------------------------------------------------
  lint:
    name: "Lint · ${{ matrix.name }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            path: api
            lang: typescript

          - name: frontend
            path: app
            lang: javascript

    defaults:
      run:
        working-directory: ${{ matrix.path }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        if: matrix.lang == 'typescript'
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint --if-present

  # ----------------------------------------------------------
  # 2. BUILD — matrix [backend, frontend]
  # ----------------------------------------------------------
  build:
    name: "Build · ${{ matrix.name }}"
    runs-on: ubuntu-latest
    needs: lint
    # FIX 1: corre si lint pasó o falló, pero NO si fue cancelado
    if: needs.lint.result == 'success' || needs.lint.result == 'failure'

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            path: api
            artifact: backend-dist
            dist: api/dist

          - name: frontend
            path: app
            artifact: frontend-dist
            dist: app/dist

    defaults:
      run:
        working-directory: ${{ matrix.path }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.dist }}
          retention-days: 3

  # ----------------------------------------------------------
  # 3. SEMGREP SAST — dividido por path: backend y frontend
  # ----------------------------------------------------------
  semgrep:
    name: "SAST · Semgrep"
    runs-on: ubuntu-latest
    needs: build
    # FIX 2: corre si build pasó o falló, pero NO si fue cancelado
    if: needs.build.result == 'success' || needs.build.result == 'failure'

    # FIX 4: permissions solo donde se necesitan (mínimo privilegio)
    permissions:
      contents: read
      security-events: write

    container:
      # FIX 3: versión fija para evitar breaking changes de latest
      image: returntocorp/semgrep:1.99.0

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Calcular política según rama/evento ───────────────
      - name: Determinar política según rama
        id: policy
        run: |
          STRICT="false"
          BASELINE=""

          if [ "${{ github.event_name }}" = "pull_request" ] \
          && [ "${{ github.base_ref }}" = "main" ]; then
            STRICT="true"
          fi

          if [ "${{ github.ref }}" = "refs/heads/main" ] \
          || echo "${{ github.ref }}" | grep -qE '^refs/heads/release/|^refs/heads/hotfix/'; then
            STRICT="true"
          fi

          if [ "${{ github.event_name }}" = "pull_request" ] \
          && [ "${{ github.base_ref }}" = "develop" ]; then
            BASELINE="--baseline-ref=origin/develop"
          fi

          echo "strict=$STRICT"     >> $GITHUB_OUTPUT
          echo "baseline=$BASELINE" >> $GITHUB_OUTPUT

      # ── Scan BACKEND — solo packs relevantes para /api ────
      # TypeScript + Node.js: sin React, sin reglas de browser
      - name: Semgrep · Backend (/api)
        run: |
          STRICT_FLAGS=""
          if [ "${{ steps.policy.outputs.strict }}" = "true" ]; then
            STRICT_FLAGS="--error --severity=ERROR"
          fi

          semgrep scan \
            --config=p/ci \
            --config=p/security-audit \
            --config=p/secrets \
            --config=p/typescript \
            --config=p/nodejs \
            --exclude=node_modules \
            --exclude=dist \
            --exclude=coverage \
            --exclude='*.min.js' \
            ${{ steps.policy.outputs.baseline }} \
            $STRICT_FLAGS \
            --sarif --output=results-backend.sarif \
            ./api

      # ── Scan FRONTEND — solo packs relevantes para /app ───
      # JavaScript + React: sin Node.js, sin reglas de servidor
      - name: Semgrep · Frontend (/app)
        run: |
          STRICT_FLAGS=""
          if [ "${{ steps.policy.outputs.strict }}" = "true" ]; then
            STRICT_FLAGS="--error --severity=ERROR"
          fi

          semgrep scan \
            --config=p/ci \
            --config=p/security-audit \
            --config=p/secrets \
            --config=p/javascript \
            --config=p/react \
            --exclude=node_modules \
            --exclude=dist \
            --exclude=build \
            --exclude=coverage \
            --exclude=.vite \
            --exclude=.turbo \
            --exclude=.next \
            --exclude='*.min.js' \
            ${{ steps.policy.outputs.baseline }} \
            $STRICT_FLAGS \
            --sarif --output=results-frontend.sarif \
            ./app

      # ── Publicar ambos reportes en Security tab ───────────
      - name: Publicar SARIF Backend
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results-backend.sarif
          category: semgrep-backend   # ← separa los resultados en la UI

      - name: Publicar SARIF Frontend
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results-frontend.sarif
          category: semgrep-frontend  # ← separa los resultados en la UI