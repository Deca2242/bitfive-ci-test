# ============================================================
#  CI Pipeline — bitfive monorepo
#  Backend : /api  (TypeScript / Node.js)
#  Frontend: /app  (JavaScript)
#
#  Jobs
#  ├── lint    → matrix: [api, app]  type-check + eslint en ambos
#  ├── build   → matrix: [api, app]  corre aunque lint falle (if: always)
#  └── semgrep → SAST con política según rama (Gitflow)
#
#  Política Semgrep
#  ├── PR → develop   : baseline scan  (solo findings nuevos, no bloquea)
#  ├── push develop   : full scan      (visible en Security tab)
#  ├── PR → main      : full scan estricto (bloquea si hay ERROR)
#  └── push main / release/* / hotfix/* : full scan estricto (bloquea)
# ============================================================

name: CI

on:
  push:
    branches:
      - main
      - develop
      - "release/*"
      - "hotfix/*"
  pull_request:
    branches:
      - main
      - develop
      
permissions:
  contents: read
  security-events: write
  
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20

jobs:
  # ----------------------------------------------------------
  # 1. LINT — matrix [backend, frontend]
  # ----------------------------------------------------------
  lint:
    name: "Lint · ${{ matrix.name }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            path: api
            lang: typescript

          - name: frontend
            path: app
            lang: javascript

    defaults:
      run:
        working-directory: ${{ matrix.path }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      # FIX 1: indentación correcta dentro de steps
      # Solo corre en backend (TypeScript)
      - name: TypeScript type-check
        if: matrix.lang == 'typescript'
        run: npx tsc --noEmit

      # FIX 2: ESLint corre en backend Y frontend (sin condicional)
      - name: ESLint
        run: npm run lint --if-present

  # ----------------------------------------------------------
  # 2. BUILD — matrix [backend, frontend]
  # ----------------------------------------------------------
  build:
    name: "Build · ${{ matrix.name }}"
    runs-on: ubuntu-latest
    needs: lint
    # FIX 3: if always() para que build corra aunque lint haya fallado
    # y la matrix se expanda correctamente
    if: always()

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            path: api
            artifact: backend-dist
            dist: api/dist

          - name: frontend
            path: app
            artifact: frontend-dist
            dist: app/dist      # ajusta si tu salida es build/, out/, etc.

    defaults:
      run:
        working-directory: ${{ matrix.path }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.dist }}
          retention-days: 3

  # ----------------------------------------------------------
  # 3. SEMGREP SAST — Análisis de seguridad estático
  # ----------------------------------------------------------
  semgrep:
    name: "SAST · Semgrep"
    runs-on: ubuntu-latest
    needs: build
    if: always()
    container:
      image: returntocorp/semgrep

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determinar política según rama
        id: policy
        run: |
          STRICT="false"
          BASELINE=""

          if [ "${{ github.event_name }}" = "pull_request" ] \
          && [ "${{ github.base_ref }}" = "main" ]; then
            STRICT="true"
          fi

          if [ "${{ github.ref }}" = "refs/heads/main" ] \
          || echo "${{ github.ref }}" | grep -qE '^refs/heads/release/|^refs/heads/hotfix/'; then
            STRICT="true"
          fi

          if [ "${{ github.event_name }}" = "pull_request" ] \
          && [ "${{ github.base_ref }}" = "develop" ]; then
            BASELINE="--baseline-ref=origin/develop"
          fi

          echo "strict=$STRICT"     >> $GITHUB_OUTPUT
          echo "baseline=$BASELINE" >> $GITHUB_OUTPUT

      - name: Ejecutar Semgrep
        run: |
          STRICT_FLAGS=""
          if [ "${{ steps.policy.outputs.strict }}" = "true" ]; then
            STRICT_FLAGS="--error --severity=ERROR"
          fi

          semgrep scan \
            --config=p/ci \
            --config=p/security-audit \
            --config=p/secrets \
            --config=p/javascript \
            --config=p/typescript \
            --config=p/nodejs \
            --config=p/react \
            --exclude=node_modules \
            --exclude=dist \
            --exclude=build \
            --exclude=coverage \
            --exclude=.vite \
            --exclude=.turbo \
            --exclude=.next \
            --exclude='*.min.js' \
            ${{ steps.policy.outputs.baseline }} \
            $STRICT_FLAGS \
            --sarif --output=results.sarif \
            ./api ./app


      - name: Publicar SARIF en Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
